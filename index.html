<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🇮🇳 Institutional F&O Dashboard</title>

<!-- ChartJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    background:#08111f;
    color:white;
    padding:20px;
}

.container{
    max-width:1600px;
    margin:auto;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

h1{
    font-size:34px;
    color:#64b5f6;
}

.controls{
    display:flex;
    gap:10px;
}

button, select{
    padding:10px 18px;
    background:#111827;
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
    margin-bottom:20px;
}

.stat-card{
    background:#111827;
    padding:22px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);
}

.stat-value{
    font-size:28px;
    font-weight:700;
    margin-bottom:8px;
}

.card{
    background:#111827;
    border-radius:20px;
    padding:24px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.08);
}

.card h2{
    margin-bottom:20px;
    color:#90caf9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    text-align:left;
    font-size:14px;
}

th{
    color:#90caf9;
}

.call{
    color:#81c784;
    font-weight:700;
}

.put{
    color:#ef5350;
    font-weight:700;
}

.neutral{
    color:#ffb74d;
    font-weight:700;
}

.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

#sectorHeatmap{
    position:relative;
    height:600px;
    background:#0b1220;
    border-radius:20px;
    overflow:hidden;
}

.bubble{
    position:absolute;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-weight:700;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.bubble:hover{
    transform:scale(1.08);
}

#momentumMap{
    position:relative;
    height:500px;
    background:#0b1220;
    border-radius:18px;
    overflow:hidden;
}

.axis-line{
    position:absolute;
    background:rgba(255,255,255,0.15);
}

.stock-node{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:700;
    color:white;
}

@media(max-width:1000px){

    .grid-2{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="container">

<header>

<h1>🇮🇳 Institutional F&O Screener</h1>

<div class="controls">

<select>
<option>NIFTY</option>
<option>BANKNIFTY</option>
</select>

<button onclick="initializeDashboard()">
🔄 Refresh
</button>

</div>

</header>

<!-- Stats -->

<div class="stats-grid">

<div class="stat-card">
<div class="stat-value" id="niftyValue">Loading...</div>
<div>NIFTY 50</div>
</div>

<div class="stat-card">
<div class="stat-value" id="bankniftyValue">Loading...</div>
<div>BANKNIFTY</div>
</div>

<div class="stat-card">
<div class="stat-value" id="bullishCount">0</div>
<div>Bullish Stocks</div>
</div>

<div class="stat-card">
<div class="stat-value" id="bearishCount">0</div>
<div>Bearish Stocks</div>
</div>

</div>

<!-- Top Layout -->

<div class="grid-2">

<!-- Screener -->

<div class="card">

<h2>🔥 Institutional Options Screener</h2>

<table id="topStocksTable"></table>

</div>

<!-- Momentum -->

<div class="card">

<h2>📊 Relative Rotation / Momentum Map</h2>

<div id="momentumMap"></div>

</div>

</div>

<!-- Sector Heatmap -->

<div class="card">

<h2>🔥 Sector Rotation Heatmap</h2>

<div id="sectorHeatmap"></div>

</div>

<!-- TradingView -->

<div class="card">

<h2>📈 TradingView Institutional Chart</h2>

<div id="tradingview_chart" style="height:650px;"></div>

</div>

</div>

<script>

const NSE_FNO_STOCKS = [

"RELIANCE.NS",
"HDFCBANK.NS",
"ICICIBANK.NS",
"SBIN.NS",
"INFY.NS",
"TCS.NS",
"LT.NS",
"AXISBANK.NS",
"BAJFINANCE.NS",
"MARUTI.NS",
"TATAMOTORS.NS",
"ADANIENT.NS",
"ADANIPORTS.NS",
"ITC.NS",
"KOTAKBANK.NS",
"WIPRO.NS",
"BHARTIARTL.NS"

];

async function fetchYahooData(symbol){

    try{

        const url =
        `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo`;

        const response = await fetch(url);

        const data = await response.json();

        const result = data.chart.result[0];

        const closes =
        result.indicators.quote[0].close;

        const volumes =
        result.indicators.quote[0].volume;

        const latest =
        closes[closes.length - 1];

        const previous =
        closes[closes.length - 2];

        const change =
        (((latest - previous)/previous)*100);

        return {

            symbol,

            latest,

            previous,

            change,

            closes,

            volumes

        };

    }catch(err){

        console.log(symbol, err);

        return null;

    }

}

function calculateRSI(closes, period = 14){

    let gains = 0;
    let losses = 0;

    for(let i=closes.length-period; i<closes.length; i++){

        const diff = closes[i] - closes[i-1];

        if(diff > 0) gains += diff;
        else losses += Math.abs(diff);

    }

    const rs = gains / losses;

    return 100 - (100 / (1 + rs));

}

async function scanInstitutionalStocks(){

    const results = [];

    let bullish = 0;
    let bearish = 0;

    for(const stock of NSE_FNO_STOCKS){

        const data =
        await fetchYahooData(stock);

        if(!data) continue;

        const closes = data.closes;

        const latest =
        closes[closes.length - 1];

        const sma20 =
        closes.slice(-20)
        .reduce((a,b)=>a+b,0)/20;

        const sma50 =
        closes.slice(-50)
        .reduce((a,b)=>a+b,0)/50;

        const momentum =
        ((latest-sma20)/sma20)*100;

        const trend =
        sma20 > sma50 ? "Bullish" : "Bearish";

        const rsi =
        calculateRSI(closes);

        let bias = "NEUTRAL";

        if(momentum > 2 && rsi > 55)
            bias = "CALL";

        if(momentum < -2 && rsi < 45)
            bias = "PUT";

        if(bias === "CALL") bullish++;
        if(bias === "PUT") bearish++;

        const institutionalScore =
        (
            Math.abs(momentum) +
            (rsi/10) +
            (trend==="Bullish" ? 8 : 2)
        ).toFixed(2);

        results.push({

            stock:stock.replace(".NS",""),

            latest,

            momentum:
            momentum.toFixed(2),

            rsi:rsi.toFixed(1),

            trend,

            bias,

            institutionalScore

        });

    }

    document.getElementById("bullishCount")
    .innerHTML = bullish;

    document.getElementById("bearishCount")
    .innerHTML = bearish;

    results.sort(
        (a,b)=>
        b.institutionalScore -
        a.institutionalScore
    );

    renderInstitutionalTable(results);

    renderMomentumMap(results);

}

function renderInstitutionalTable(data){

    const table =
    document.getElementById("topStocksTable");

    let html = `
    <thead>
    <tr>

    <th>Stock</th>
    <th>Price</th>
    <th>Momentum</th>
    <th>RSI</th>
    <th>Trend</th>
    <th>Bias</th>
    <th>Score</th>

    </tr>
    </thead>

    <tbody>
    `;

    data.slice(0,15).forEach(stock=>{

        html += `
        <tr>

        <td>
        <strong>${stock.stock}</strong>
        </td>

        <td>
        ₹${stock.latest.toFixed(2)}
        </td>

        <td style="
        color:${stock.momentum > 0 ? '#81c784':'#ef5350'}
        ">
        ${stock.momentum}%
        </td>

        <td>
        ${stock.rsi}
        </td>

        <td>
        ${stock.trend}
        </td>

        <td class="${stock.bias.toLowerCase()}">
        ${stock.bias}
        </td>

        <td>
        ${stock.institutionalScore}
        </td>

        </tr>
        `;

    });

    html += "</tbody>";

    table.innerHTML = html;

}

function renderMomentumMap(data){

    const container =
    document.getElementById("momentumMap");

    container.innerHTML = "";

    const vertical =
    document.createElement("div");

    vertical.className = "axis-line";

    vertical.style.cssText = `
    width:2px;
    height:100%;
    left:50%;
    top:0;
    `;

    container.appendChild(vertical);

    const horizontal =
    document.createElement("div");

    horizontal.className = "axis-line";

    horizontal.style.cssText = `
    height:2px;
    width:100%;
    top:50%;
    left:0;
    `;

    container.appendChild(horizontal);

    data.slice(0,10).forEach((stock,index)=>{

        const node =
        document.createElement("div");

        node.className = "stock-node";

        const x =
        50 + parseFloat(stock.momentum)*5;

        const y =
        100 - stock.rsi;

        const color =
        stock.bias === "CALL"
        ? "#22c55e"
        : stock.bias === "PUT"
        ? "#ef4444"
        : "#f59e0b";

        node.style.cssText = `
        left:${x}%;
        top:${y}%;
        background:${color};
        `;

        node.innerHTML =
        stock.stock.substring(0,6);

        container.appendChild(node);

    });

}

const sectors = [

{name:"BANKING", strength:92},
{name:"IT", strength:68},
{name:"AUTO", strength:77},
{name:"FMCG", strength:44},
{name:"REALTY", strength:31},
{name:"METALS", strength:81},
{name:"ENERGY", strength:87},
{name:"PHARMA", strength:74}

];

function renderSectorHeatmap(){

    const container =
    document.getElementById("sectorHeatmap");

    container.innerHTML = "";

    sectors.forEach((sector,index)=>{

        const div =
        document.createElement("div");

        const size =
        sector.strength * 2;

        const green =
        Math.floor(sector.strength * 2);

        const red =
        255 - green;

        div.className = "bubble";

        div.style.cssText = `

        width:${size}px;
        height:${size}px;

        background:
        rgba(${red},${green},120,0.85);

        left:${10 + (index % 4) * 22}%;

        top:${10 + Math.floor(index/4) * 40}%;

        font-size:14px;

        `;

        div.innerHTML = `
        <div>${sector.name}</div>
        <div style="font-size:12px">
        ${sector.strength}
        </div>
        `;

        container.appendChild(div);

    });

}

function loadTradingView(){

    new TradingView.widget({

        "autosize": true,

        "symbol": "NSE:RELIANCE",

        "interval": "15",

        "timezone": "Asia/Kolkata",

        "theme": "dark",

        "style": "1",

        "locale": "en",

        "toolbar_bg": "#111827",

        "enable_publishing": false,

        "allow_symbol_change": true,

        "container_id": "tradingview_chart",

        "studies": [

            "RSI@tv-basicstudies",
            "MACD@tv-basicstudies",
            "Volume@tv-basicstudies"

        ]

    });

}

async function loadIndexData(){

    const nifty =
    await fetchYahooData("^NSEI");

    const banknifty =
    await fetchYahooData("^NSEBANK");

    if(nifty){

        document.getElementById(
        "niftyValue"
        ).innerHTML =
        `
        ${nifty.latest.toFixed(2)}
        <div style="
        color:${nifty.change > 0 ? '#81c784':'#ef5350'};
        font-size:15px;
        ">
        ${nifty.change.toFixed(2)}%
        </div>
        `;

    }

    if(banknifty){

        document.getElementById(
        "bankniftyValue"
        ).innerHTML =
        `
        ${banknifty.latest.toFixed(2)}
        <div style="
        color:${banknifty.change > 0 ? '#81c784':'#ef5350'};
        font-size:15px;
        ">
        ${banknifty.change.toFixed(2)}%
        </div>
        `;

    }

}

async function initializeDashboard(){

    await loadIndexData();

    await scanInstitutionalStocks();

    renderSectorHeatmap();

    document.getElementById(
    "tradingview_chart"
    ).innerHTML = "";

    loadTradingView();

}

initializeDashboard();

setInterval(async()=>{

    await scanInstitutionalStocks();

}, 60000);

</script>

</body>
</html>
